name: Nightly

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check for recent commits
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.decide.outputs.should-build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: decide
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — building."
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$(git log --since='24 hours ago' --oneline)" ]; then
            echo "Commits found in last 24h — building."
            echo "should-build=true" >> "$GITHUB_OUTPUT"
          else
            echo "No commits in last 24h — skipping nightly."
            echo "should-build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.os }}
    needs: check
    if: needs.check.outputs.should-build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Stamp nightly version
        shell: bash
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d)
          node -e "
            const fs = require('fs');
            const p = require('./package.json');
            const base = p.version.split('-')[0];
            p.version = base + '-nightly.' + '${DATE}' + '.' + '${SHA}';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
            console.log('version =', p.version);
          "

      - name: Compile main + renderer
        run: npm run build

      - name: Package with electron-builder
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAC_CSC_LINK: ${{ secrets.CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          MAC_APPLE_ID: ${{ secrets.APPLE_ID }}
          MAC_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MAC_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "$RUNNER_OS" = "macOS" ] && [ -n "$MAC_CSC_LINK" ]; then
            echo "Apple credentials detected — building signed + notarized."
            export CSC_LINK="$MAC_CSC_LINK"
            export CSC_KEY_PASSWORD="$MAC_CSC_KEY_PASSWORD"
            export APPLE_ID="$MAC_APPLE_ID"
            export APPLE_APP_SPECIFIC_PASSWORD="$MAC_APPLE_APP_SPECIFIC_PASSWORD"
            export APPLE_TEAM_ID="$MAC_APPLE_TEAM_ID"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            echo "No Apple credentials in repo secrets — building unsigned."
          fi
          if [ "$RUNNER_OS" = "macOS" ]; then
            npx electron-builder --mac --arm64 --publish never
          else
            npx electron-builder --publish never
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: overcli-nightly-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: ignore
          retention-days: 1

  release:
    name: Publish nightly release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Move nightly tag to current commit
        run: |
          git tag -f nightly
          git push origin nightly --force

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          body: |
            Auto-built nightly from commit `${{ github.sha }}`.

            > Pre-release. Not notarized on macOS — Gatekeeper will warn on first launch.
          files: artifacts/*

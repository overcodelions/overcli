name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read   # least privilege at the top; the analyze job elevates itself

jobs:
  preflight:
    name: Check repo visibility
    runs-on: ubuntu-latest
    outputs:
      is_public: ${{ steps.check.outputs.is_public }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          visibility=$(gh api "repos/${{ github.repository }}" --jq .visibility)
          if [ "$visibility" = "public" ]; then
            echo "is_public=true" >> "$GITHUB_OUTPUT"
          else
            echo "Repo is $visibility — skipping CodeQL. Code Scanning upload requires a public repo or GitHub Advanced Security."
            echo "is_public=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze ${{ matrix.language }}
    needs: preflight
    if: needs.preflight.outputs.is_public == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write   # upload CodeQL results to code scanning
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: "/language:${{ matrix.language }}"

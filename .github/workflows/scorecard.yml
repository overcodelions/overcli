name: Scorecard

# OpenSSF Scorecard — audits the repo's security posture (branch protection,
# pinned actions, code scanning, token permissions, etc.) and publishes a
# public score. Results surface in the Security tab and drive the README badge.

on:
  branch_protection_rule:
  schedule:
    - cron: '32 7 * * 1'   # weekly, Monday
  push:
    branches: [master]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload results to code scanning
      id-token: write          # publish results to the OpenSSF API
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true   # required for the public badge

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

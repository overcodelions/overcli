name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Compile main + renderer
        run: npm run build

      - name: Package with electron-builder
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAC_CSC_LINK: ${{ secrets.CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          MAC_APPLE_ID: ${{ secrets.APPLE_ID }}
          MAC_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MAC_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "$RUNNER_OS" = "macOS" ] && [ -n "$MAC_CSC_LINK" ]; then
            echo "Apple credentials detected — building signed + notarized."
            export CSC_LINK="$MAC_CSC_LINK"
            export CSC_KEY_PASSWORD="$MAC_CSC_KEY_PASSWORD"
            export APPLE_ID="$MAC_APPLE_ID"
            export APPLE_APP_SPECIFIC_PASSWORD="$MAC_APPLE_APP_SPECIFIC_PASSWORD"
            export APPLE_TEAM_ID="$MAC_APPLE_TEAM_ID"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            echo "No Apple credentials in repo secrets — building unsigned."
          fi
          npx electron-builder --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: overcli-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/latest*.yml
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the release
      id-token: write        # sign the provenance attestation (OIDC)
      attestations: write    # store the provenance attestation
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: artifacts
        run: |
          shopt -s nullglob
          sha256sum *.dmg *.zip *.exe *.AppImage *.deb > SHA256SUMS.txt || true
          echo "Checksums:" && cat SHA256SUMS.txt

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: artifacts/overcli-sbom.cyclonedx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.deb

      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*

version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      types:
        patterns:
          - "@types/*"
      dev-tooling:
        patterns:
          - "vite*"
          - "vitest*"
          - "@vitejs/*"
          - "@vitest/*"
          - "typescript"
          - "concurrently"
          - "cross-env"
          - "wait-on"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
